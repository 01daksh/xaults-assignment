# Run the entire stack with: docker compose up --build
# Stop and clean up with:    docker compose down -v(along with volumes)

services:

  postgres:
    image: postgres:16-alpine
    container_name: xaults_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB:       ${DB_NAME:-xaults}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-xaults}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xaults_app
    restart: unless-stopped
    ports:
      - "${PORT:-1323}:1323"
      - "${PPROF_PORT:-6060}:6060"
    environment:
      PORT:                  ${PORT:-1323}
      PPROF_PORT:            ${PPROF_PORT:-6060}
      DB_HOST:               postgres
      DB_PORT:               5432
      DB_USER:               ${DB_USER:-postgres}
      DB_PASSWORD:           ${DB_PASSWORD:-postgres}
      DB_NAME:               ${DB_NAME:-xaults}
      DB_SSL_MODE:           disable
      DB_MAX_OPEN_CONNS:     ${DB_MAX_OPEN_CONNS:-25}
      DB_MAX_IDLE_CONNS:     ${DB_MAX_IDLE_CONNS:-5}
      DB_CONN_MAX_LIFETIME:  ${DB_CONN_MAX_LIFETIME:-5}
    depends_on:
      postgres:
        condition: service_healthy 
  
  prometheus:
    image: prom/prometheus:latest
    container_name: xaults_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - app

volumes:
  postgres_data:
