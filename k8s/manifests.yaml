apiVersion: v1
kind: Namespace
metadata:
  name: xaults
---
apiVersion: v1
kind: Secret
metadata:
  name: xaults-secrets
  namespace: xaults
type: Opaque
data:
  DB_USER: cG9zdGdyZXM= #postgres
  DB_PASSWORD: cG9zdGdyZXM= #postgres
  DB_NAME: eGF1bHRz #xaults
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: xaults-api-config
  namespace: xaults
data:
  PORT: "1323"
  PPROF_PORT: "6060"
  ENABLE_PPROF: "false"
  DB_HOST: xaults-postgres
  DB_PORT: "5432"
  DB_SSL_MODE: disable
  DB_MAX_OPEN_CONNS: "25"
  DB_MAX_IDLE_CONNS: "5"
  DB_CONN_MAX_LIFETIME: "5"
---
apiVersion: v1
kind: Service
metadata:
  name: xaults-postgres-headless
  namespace: xaults
spec:
  clusterIP: None #db is stateful app, so headless service
  selector:
    app.kubernetes.io/name: xaults-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: xaults-postgres
  namespace: xaults
spec:
  selector:
    app.kubernetes.io/name: xaults-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xaults-postgres
  namespace: xaults
spec:
  replicas: 1
  #which pods to select for this deployment
  selector:
    matchLabels:
      app.kubernetes.io/name: xaults-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: xaults-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
              #injecting variables from secrets
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: xaults-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: xaults-secrets
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: xaults-secrets
                  key: DB_NAME
          #important: makes sure the database is ready before accepting connections
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          #to check if 5432 is open  
          livenessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          #requests resources with limits  
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-run
              mountPath: /var/run/postgresql
      volumes:
        #currently using emptyDir for assignment purpose, could use pvc
        - name: postgres-data
          emptyDir: {}
        - name: postgres-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: xaults-api
  namespace: xaults
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: xaults-api
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xaults-api
  namespace: xaults
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: xaults-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: xaults-api
    spec:
      containers:
        - name: api
          image: xaults-assignment:latest #local image
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 1323
          envFrom:
            - configMapRef:
                name: xaults-api-config
            - secretRef:
                name: xaults-secrets
          #readiness and liveliness to make sure the the app is healthy and the app port is free      
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xaults-api
  namespace: xaults
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 1m
spec:
  #could add ssl(https) support as well as domains
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: xaults-api
                port:
                  number: 80

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: xaults
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: "xaults-api"
        metrics_path: /metrics
        static_configs:
          # IMPORTANT: using service DNS inside same namespace
          - targets: ["xaults-api.xaults.svc.cluster.local:80"]

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: xaults
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.xaults.svc.cluster.local:9090
        isDefault: true
        editable: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: xaults
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: xaults
        orgId: 1
        folder: Xaults
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/xaults

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: xaults
data:
  xaults-api-observability-dashboard.json: |
    {
      "uid": "xaults-observability",
      "title": "Xaults API Observability",
      "tags": ["xaults", "observability", "golden-signals"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 2,
      "refresh": "5s",
      "panels": [
        {
          "type": "timeseries",
          "title": "Request Rate (Traffic)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum by (method, path) (rate(http_requests_total[1m]))",
              "legendFormat": "{{method}} {{path}}"
            }
          ],
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 }
        },
        {
          "type": "timeseries",
          "title": "5xx Error Rate",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum by (method, path) (rate(http_requests_total{status=~\"5..\"}[5m]))",
              "legendFormat": "{{method}} {{path}}"
            }
          ],
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 }
        },
        {
          "type": "timeseries",
          "title": "P95 Latency (seconds)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, method, path) (rate(http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "{{method}} {{path}}"
            }
          ],
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 }
        },
        {
          "type": "stat",
          "title": "Error Percentage",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "100 * sum(rate(http_requests_total{status=~\"5..\"}[5m])) / clamp_min(sum(rate(http_requests_total[5m])), 0.001)"
            }
          ],
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 }
        },
        {
          "type": "timeseries",
          "title": "CPU Usage (cores)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "rate(process_cpu_seconds_total[1m])",
              "legendFormat": "cpu"
            }
          ],
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 }
        },
        {
          "type": "timeseries",
          "title": "Memory Usage (bytes)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "process_resident_memory_bytes",
              "legendFormat": "memory"
            }
          ],
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 }
        },
        {
          "type": "stat",
          "title": "Active Services",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "active_services_total"
            }
          ],
          "gridPos": { "x": 0, "y": 24, "w": 6, "h": 6 }
        },
        {
          "type": "timeseries",
          "title": "Open Incidents by Severity",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "open_incidents_total",
              "legendFormat": "{{severity}}"
            }
          ],
          "gridPos": { "x": 6, "y": 24, "w": 18, "h": 6 }
        }
      ]
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: xaults
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: xaults
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      # optional: fixed port for easier review
      nodePort: 30090

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: xaults
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana
          ports:
            - containerPort: 3000
          env:
            # OPTIONAL: sets default login (nice for reviewer)
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards/xaults
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: xaults
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300
      
